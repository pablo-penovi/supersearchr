name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        run: |
          set -euo pipefail
          curl -L "https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.15.2" >> "$GITHUB_PATH"

      - name: Verify Zig
        run: zig version

      - name: Run tests
        run: zig build test --summary all

  build-targets:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux
          - x86_64-macos
          - aarch64-macos
          - x86_64-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        run: |
          set -euo pipefail
          curl -L "https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.15.2" >> "$GITHUB_PATH"

      - name: Verify Zig
        run: zig version

      - name: Cross-compile
        run: zig build -Dtarget=${{ matrix.target }}

  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig 0.15.2
        run: |
          set -euo pipefail
          curl -L "https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.15.2" >> "$GITHUB_PATH"
      - name: Check formatting
        run: zig fmt --check src/

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig 0.15.2
        run: |
          set -euo pipefail
          curl -L "https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.15.2" >> "$GITHUB_PATH"
      - name: Install kcov
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y cmake libdw-dev libelf-dev zlib1g-dev binutils-dev
          git clone --depth 1 https://github.com/SimonKagstrom/kcov.git kcov-src
          cmake -S kcov-src -B kcov-build -DCMAKE_DISABLE_FIND_PACKAGE_CURL=TRUE
          cmake --build kcov-build --parallel
          sudo cmake --install kcov-build
      - name: Run coverage
        run: zig build coverage
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/merged/cobertura.xml
          fail_ci_if_error: true
