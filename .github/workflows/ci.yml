name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        run: |
          set -euo pipefail
          curl -L "https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.15.2" >> "$GITHUB_PATH"

      - name: Verify Zig
        run: zig version

      - name: Run tests
        run: zig build test --summary all

  build-targets:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux
          - x86_64-macos
          - aarch64-macos
          - x86_64-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        run: |
          set -euo pipefail
          curl -L "https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.15.2" >> "$GITHUB_PATH"

      - name: Verify Zig
        run: zig version

      - name: Cross-compile
        run: zig build -Dtarget=${{ matrix.target }}

  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig 0.15.2
        run: |
          set -euo pipefail
          curl -L "https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.15.2" >> "$GITHUB_PATH"
      - name: Check formatting
        run: zig fmt --check src/

  coverage:
    name: Coverage
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        run: |
          set -euo pipefail
          curl -L "https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.15.2" >> "$GITHUB_PATH"

      - name: Install kcov
        run: |
          sudo apt-get update
          sudo apt-get install -y kcov

      - name: Build test binaries
        run: |
          set -euo pipefail
          mkdir -p coverage

          zig test src/config.zig \
            --test-no-exec -femit-bin=coverage/test-config

          zig test src/jackett/client.zig \
            --dep torrent \
            --dep debug_log \
            --mod torrent::src/structs/torrent.zig \
            --mod debug_log::src/debug/log.zig \
            --test-no-exec -femit-bin=coverage/test-jackett

          zig test src/superseedr/client.zig \
            --dep debug_log \
            --mod debug_log::src/debug/log.zig \
            --test-no-exec -femit-bin=coverage/test-superseedr

          zig test src/tui/theme.zig \
            --dep term \
            --mod term::src/tui/term.zig \
            --test-no-exec -femit-bin=coverage/test-theme

          zig test src/tui/widgets/search.zig \
            --dep term \
            --dep theme \
            --mod term::src/tui/term.zig \
            --mod theme:term:src/tui/theme.zig \
            --test-no-exec -femit-bin=coverage/test-search

          zig test src/tui/widgets/results.zig \
            --dep term \
            --dep theme \
            --dep torrent \
            --mod term::src/tui/term.zig \
            --mod theme:term:src/tui/theme.zig \
            --mod torrent::src/structs/torrent.zig \
            --test-no-exec -femit-bin=coverage/test-results

          zig test src/tui/panels.zig \
            --dep term \
            --dep theme \
            --dep results \
            --mod term::src/tui/term.zig \
            --mod theme:term:src/tui/theme.zig \
            --mod torrent::src/structs/torrent.zig \
            --mod results:term,theme,torrent:src/tui/widgets/results.zig \
            --test-no-exec -femit-bin=coverage/test-panels

          zig test src/tui/app.zig \
            --dep config \
            --dep jackett \
            --dep superseedr \
            --dep term \
            --dep theme \
            --dep panels \
            --dep search \
            --dep results \
            --dep torrent \
            --dep debug_log \
            --mod config::src/config.zig \
            --mod torrent::src/structs/torrent.zig \
            --mod debug_log::src/debug/log.zig \
            --mod term::src/tui/term.zig \
            --mod theme:term:src/tui/theme.zig \
            --mod jackett:torrent,debug_log:src/jackett/client.zig \
            --mod superseedr:debug_log:src/superseedr/client.zig \
            --mod results:term,theme,torrent:src/tui/widgets/results.zig \
            --mod search:term,theme:src/tui/widgets/search.zig \
            --mod panels:term,theme,results:src/tui/panels.zig \
            --test-no-exec -femit-bin=coverage/test-app

      - name: Run coverage
        run: |
          set -euo pipefail
          kcov --include-path=src coverage/config    ./coverage/test-config
          kcov --include-path=src coverage/jackett   ./coverage/test-jackett
          kcov --include-path=src coverage/superseedr ./coverage/test-superseedr
          kcov --include-path=src coverage/theme     ./coverage/test-theme
          kcov --include-path=src coverage/search    ./coverage/test-search
          kcov --include-path=src coverage/results   ./coverage/test-results
          kcov --include-path=src coverage/panels    ./coverage/test-panels
          kcov --include-path=src coverage/app       ./coverage/test-app
          kcov --merge coverage/merged \
            coverage/config coverage/jackett coverage/superseedr \
            coverage/theme coverage/search coverage/results \
            coverage/panels coverage/app

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/merged/cobertura.xml
          fail_ci_if_error: true
